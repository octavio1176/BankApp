
application.yml:
spring:
  application:
    name: smartbank-management-system

  # Database Configuration
  datasource:
    url: jdbc:h2:file:./data/smartbankdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true      
    properties:
      hibernate:
       format_sql: true  
      dialect: org.hibernate.dialect.H2Dialect
    database-platform: org.hibernate.dialect.H2Dialect

  mail:
   host: smtp.gmail.com
   port: 587
   username: zangooctavio340@gmail.com
   password: duoq nyoo xdco qyvk
   properties:
    mail:
     smtp:
       auth: true
       starttls:
         enable: true

server:
  port: 8080

logging:
   level:
     root: INFO
     com.bank.smartbank: DEBUG
     org.springframework.security: DEBUG
     org.hibernate.SQL: DEBUG
   pattern:
     console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
   file:
      name: logs/smart-bank.log
